version: "3.8"

services:
  arangodb:
    image: arangodb:3.12
    container_name: arangodb_crud
    restart: unless-stopped
    ports:
      - "8529:8529"
    environment:
      - ARANGO_ROOT_PASSWORD=senha123
    volumes:
      - arangodb_data:/var/lib/arangodb3
      - arangodb_apps:/var/lib/arangodb3-apps
    healthcheck:
      test: ["CMD", "arangosh", "--server.password", "senha123", "--execute", "db._version()"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    container_name: python_app
    depends_on:
      arangodb:
        condition: service_healthy
    environment:
      - ARANGO_HOST=arangodb
      - ARANGO_PORT=8529
      - ARANGO_ROOT_PASSWORD=senha123

volumes:
  arangodb_data:
  arangodb_apps: